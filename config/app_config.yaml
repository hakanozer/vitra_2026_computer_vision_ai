# config/app_config.yaml
# Ana uygulama konfigürasyonu

camera:
  source: 0                          # 0 = varsayılan USB kamera, "rtsp://..." için URL girin
  width: 1280
  height: 720
  fps: 30
  reconnect_delay_seconds: 3.0
  max_reconnect_attempts: 10

pipeline:
  default_camera_id: "camera-0"
  target_fps: 15.0                   # Inference FPS hedefi
  capture_save_every_n_seconds: 15000.0 # Kaç saniyede bir frame dataset adayına eklenir

mqtt:
  host: "${MQTT_HOST:-mosquitto}"
  port: 1883
  base_topic: "vitra/ai"

modbus:
  host: "${MODBUS_HOST:-mock-plc}"
  port: 502
  alarm_coil_address: 0

data_dirs:
  raw_captures: "data/raw_captures"
  labeling_queue: "data/labeling_queue"
  dataset: "data/dataset"
  model_registry: "data/models/registry"
  production_model: "data/models/production"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
