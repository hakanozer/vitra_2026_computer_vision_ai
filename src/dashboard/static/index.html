<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitra Endüstriyel AI — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .badge { padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #16a34a; color: #fff; }
    .badge-red { background: #dc2626; color: #fff; }
    .badge-gray { background: #475569; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; padding: 24px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 8px; }
    .card .value { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
    .card .sub { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .section { padding: 0 24px 24px; }
    .section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #cbd5e1; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    th { background: #0f172a; padding: 10px 14px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
    td { padding: 10px 14px; border-top: 1px solid #334155; font-size: 0.85rem; }
    .defect { color: #f87171; }
    .ok { color: #4ade80; }
  </style>
</head>
<body>
  <header>
    <h1>🏭 Vitra Endüstriyel AI</h1>
    <span id="model-badge" class="badge badge-gray">Model: Yükleniyor…</span>
    <span id="uptime-badge" class="badge badge-gray" style="margin-left:auto">Uptime: —</span>
  </header>

  <div class="grid">
    <div class="card">
      <h2>İşlenen Frame</h2>
      <div class="value" id="total-frames">—</div>
      <div class="sub">Toplam</div>
    </div>
    <div class="card">
      <h2>Tespit Edilen Hata</h2>
      <div class="value defect" id="total-defects">—</div>
      <div class="sub">Toplam defect</div>
    </div>
    <div class="card">
      <h2>Bekleyen Etiketleme</h2>
      <div class="value" id="pending-labels">—</div>
      <div class="sub">Labeling queue</div>
    </div>
    <div class="card">
      <h2>Onaylanan Örnek</h2>
      <div class="value ok" id="approved-labels">—</div>
      <div class="sub">Dataset'e eklenen</div>
    </div>
  </div>

  <div class="section">
    <h3>Son Tespitler</h3>
    <table>
      <thead><tr><th>Zaman</th><th>Kamera</th><th>Sınıf</th><th>Güven</th><th>Süre (ms)</th></tr></thead>
      <tbody id="detections-body"><tr><td colspan="5" style="text-align:center;color:#64748b">Yükleniyor…</td></tr></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
